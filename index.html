    <script type="text/javascript">
      (function () {
        var redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (redirect) {
          var path = decodeURIComponent(redirect[1]).replace(/~and~/g, '&');
          window.history.replaceState(
            null,
            null,
            window.location.pathname.slice(0, -1) + path + window.location.hash,
          );
        }
      })();
    </script>
