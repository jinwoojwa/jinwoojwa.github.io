<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>My DevLog</title>
    <script type="text/javascript">
      var l = window.location;
      // 경로를 안전하게 인코딩하여 메인(index.html)으로 전달
      var path = l.pathname.split('/').slice(1).join('/');
      var query = l.search
        ? '&q=' + l.search.slice(1).replace(/&/g, '~and~')
        : '';
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/?p=/' +
          encodeURIComponent(path) +
          query +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
